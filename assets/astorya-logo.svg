<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <!-- Sphère 3D : dégradé radial du blanc/rose pâle au rouge profond -->
    <radialGradient id="astSphere" cx="35%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#f5d1d8" />
      <stop offset="22%" stop-color="#e8a5b2" />
      <stop offset="55%" stop-color="#c91c45" />
      <stop offset="100%" stop-color="#7a1126" />
    </radialGradient>
    <!-- Ombre portée sous la sphère -->
    <radialGradient id="astShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Ombre portée -->
  <ellipse cx="175" cy="310" rx="140" ry="14" fill="url(#astShadow)" />

  <!-- Sphère 3D rouge brand Astorya -->
  <circle cx="165" cy="165" r="148" fill="url(#astSphere)" />
  <!-- Highlight blanc en haut-gauche pour le rendu 3D -->
  <ellipse cx="120" cy="105" rx="55" ry="35" fill="#ffffff" opacity="0.45" />
  <!-- Crescent intérieur : la zone sombre forme une "lune" -->
  <path d="M 100 60 A 145 145 0 1 0 260 270 A 105 105 0 1 1 100 60 Z"
        fill="#ffffff" opacity="0.05" />

  <!-- Texte "astorya" en rouge brand -->
  <text x="390" y="200" font-size="220" font-weight="500" font-style="italic" fill="#c91c45" letter-spacing="-4">astorya</text>

  <!-- Sous-titre "solution globale informatique" en bleu navy -->
  <text x="400" y="280" font-size="44" font-weight="700" fill="#252e44" letter-spacing="1">solution globale informatique</text>
</svg>

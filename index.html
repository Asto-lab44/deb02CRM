<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hub Astorya — Accueil ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f3f5f8; font-family: 'Inter', system-ui, sans-serif; }
    #root { height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
  <script src="components/supabase-config.js?v=202606082130"></script>
  <script src="components/supabase-client.js?v=202606082130"></script>
  <script src="components/api.js?v=202606082130"></script>
  <script src="components/hub-user-menu.js?v=202606082130"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function() {
      if (window.api && window.api.auth && window.HubSupabase && window.HubSupabase.enabled) {
        window.api.auth.requireAuth();
      }
    });
  </script>
  <script src="components/access-store.js?v=202606082130"></script>
  <script src="components/hub-data.js?v=202606082130"></script>
  <script src="components/hub-nav.js?v=202606082130"></script>
  <script defer src="dist/design-canvas.js?v=202606082130"></script>
  <script defer src="dist/components/LoginModal.js?v=202606082130"></script>
  <script defer src="dist/components/ERPHome.js?v=202606082130"></script>

    <script defer>
    window.addEventListener("DOMContentLoaded", function() {
      // Error boundary : si ERPHome crash, affiche l'erreur en grand au lieu
      // de laisser React unmount silencieusement vers un écran blanc.
      function ErrorBoundary(props) {
        var s = React.useState({ err: null });
        var state = s[0], setState = s[1];
        React.useEffect(function () {
          window.addEventListener("error", function (e) {
            setState({ err: e.message + (e.filename ? " — " + e.filename.split("/").pop() + ":" + e.lineno : "") });
          });
        }, []);
        if (state.err) {
          return React.createElement("div", {
            style: { padding: 24, fontFamily: "monospace", background: "#fff5f5", color: "#9b1c1c", border: "1px solid #fecaca", margin: 20, borderRadius: 8 }
          }, [
            React.createElement("h2", { key: "h", style: { marginTop: 0 } }, "Erreur de chargement"),
            React.createElement("pre", { key: "p", style: { whiteSpace: "pre-wrap" } }, state.err),
            React.createElement("a", { key: "a", href: "/debug.html", style: { color: "#0f172a", fontWeight: 600 } }, "→ Ouvrir /debug.html pour diagnostiquer"),
          ]);
        }
        try { return React.createElement(ERPHome); }
        catch (e) {
          return React.createElement("div", { style: { padding: 24, color: "#9b1c1c" } }, "Crash : " + e.message);
        }
      }
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary));
    });
  </script>
</body>
</html>
